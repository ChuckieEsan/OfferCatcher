spring.application.name=OfferCatcher

# Use existing PostgreSQL container for tests
spring.datasource.url=jdbc:postgresql://localhost:5432/offer_catcher_v2_test
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Qdrant for tests
offercatcher.qdrant.host=localhost
offercatcher.qdrant.port=6333
offercatcher.qdrant.collection=questions
offercatcher.qdrant.vector-size=1024
