spring.application.name=OfferCatcher

# Use existing PostgreSQL container for tests
spring.datasource.url=jdbc:postgresql://localhost:5432/offer_catcher_v2_test
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Qdrant configuration
offercatcher.qdrant.host=localhost
offercatcher.qdrant.grpc-port=6334
offercatcher.qdrant.http-port=6333
offercatcher.qdrant.collection=questions_test
offercatcher.qdrant.session-summary-collection=session_summaries_test
offercatcher.qdrant.vector-size=1024

# Redis configuration
offercatcher.redis.host=localhost
offercatcher.redis.port=6379
offercatcher.redis.password=
offercatcher.redis.database=0
offercatcher.redis.ttl=86400

# LLM - empty keys to avoid accidental API calls
offercatcher.llm.default-provider=deepseek
offercatcher.llm.deepseek.api-key=
offercatcher.llm.deepseek.base-url=https://api.deepseek.com/v1
offercatcher.llm.deepseek.model=deepseek-chat
offercatcher.llm.openai.api-key=
offercatcher.llm.openai.base-url=https://api.openai.com/v1
offercatcher.llm.openai.model=gpt-4o
offercatcher.llm.siliconflow.api-key=
offercatcher.llm.siliconflow.base-url=https://api.siliconflow.cn/v1
offercatcher.llm.siliconflow.model=Qwen/Qwen2.5-7B-Instruct
offercatcher.llm.dashscope.api-key=
offercatcher.llm.dashscope.model=qwen-plus

# Embedding & Reranker
offercatcher.embedding.model-path=models/bge-m3
offercatcher.embedding.vector-size=1024
offercatcher.reranker.model-path=models/bge-reranker-base
offercatcher.reranker.max-length=512

# WebSearch - empty key
offercatcher.web-search.tavily-api-key=

# Memory & Interview
offercatcher.memory.retrieval-min-length=10
offercatcher.memory.top-k=5
offercatcher.memory.context-max-size=20480
offercatcher.interview.max-follow-ups=3

# Telemetry disabled
offercatcher.telemetry.otlp-endpoint=http://localhost:4317
offercatcher.telemetry.enabled=false
management.metrics.export.otlp.enabled=false
management.metrics.export.otlp.url=http://localhost:4317/v1/metrics
management.health.redis.enabled=false

# Disable workers in tests (no LLM API key configured)
offercatcher.worker.extract.enabled=false
