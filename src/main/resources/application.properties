spring.application.name=OfferCatcher

# Docker Compose 由外部管理，禁用 Spring Boot 自动管理
spring.docker.compose.enabled=false

# ==================== 数据源配置 ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/offer_catcher_v2
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==================== Spring RabbitMQ 配置 ====================
spring.rabbitmq.host=${offercatcher.rabbitmq.host}
spring.rabbitmq.port=${offercatcher.rabbitmq.port}
spring.rabbitmq.username=${offercatcher.rabbitmq.user}
spring.rabbitmq.password=${offercatcher.rabbitmq.password}
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.prefetch=${offercatcher.rabbitmq.prefetch-count}
spring.rabbitmq.listener.simple.auto-startup=true

# ==================== OfferCatcher LLM 配置 ====================
offercatcher.llm.default-provider=deepseek
offercatcher.llm.deepseek.api-key=${DEEPSEEK_API_KEY:}
offercatcher.llm.deepseek.base-url=https://api.deepseek.com/v1
offercatcher.llm.deepseek.model=deepseek-chat
offercatcher.llm.openai.api-key=${OPENAI_API_KEY:}
offercatcher.llm.openai.base-url=https://api.openai.com/v1
offercatcher.llm.openai.model=gpt-4o
offercatcher.llm.siliconflow.api-key=${SILICONFLOW_API_KEY:}
offercatcher.llm.siliconflow.base-url=https://api.siliconflow.cn/v1
offercatcher.llm.siliconflow.model=Qwen/Qwen2.5-7B-Instruct
offercatcher.llm.dashscope.api-key=${DASHSCOPE_API_KEY:}
offercatcher.llm.dashscope.model=qwen-plus

# ==================== OfferCatcher Embedding 配置 ====================
offercatcher.embedding.model-path=models/bge-m3
offercatcher.embedding.vector-size=1024

# ==================== OfferCatcher Reranker 配置 ====================
offercatcher.reranker.model-path=models/bge-reranker-base
offercatcher.reranker.max-length=512

# ==================== OfferCatcher Qdrant 配置 ====================
offercatcher.qdrant.host=${QDRANT_HOST:localhost}
offercatcher.qdrant.grpc-port=6334
offercatcher.qdrant.http-port=6333
offercatcher.qdrant.collection=questions
offercatcher.qdrant.session-summary-collection=session_summaries
offercatcher.qdrant.vector-size=1024

# ==================== OfferCatcher ASR 配置（讯飞） ====================
offercatcher.asr.app-id=${XFYUN_APP_ID:}
offercatcher.asr.api-key=${XFYUN_API_KEY:}
offercatcher.asr.api-secret=${XFYUN_API_SECRET:}

# ==================== OfferCatcher OCR 配置 ====================
offercatcher.ocr.service-url=${OCR_SERVICE_URL:http://localhost:8001}
offercatcher.ocr.connect-timeout=30
offercatcher.ocr.read-timeout=60

# ==================== OfferCatcher RabbitMQ 配置 ====================
offercatcher.rabbitmq.host=${RABBITMQ_HOST:localhost}
offercatcher.rabbitmq.port=5672
offercatcher.rabbitmq.user=guest
offercatcher.rabbitmq.password=guest
offercatcher.rabbitmq.queue=answer_tasks
offercatcher.rabbitmq.dlq=answer_tasks_dlq
offercatcher.rabbitmq.max-retries=3
offercatcher.rabbitmq.prefetch-count=5

# ==================== OfferCatcher Redis 配置 ====================
offercatcher.redis.host=${REDIS_HOST:localhost}
offercatcher.redis.port=6379
offercatcher.redis.password=${REDIS_PASSWORD:}
offercatcher.redis.database=0
offercatcher.redis.ttl=86400

# ==================== OfferCatcher WebSearch 配置 ====================
offercatcher.web-search.tavily-api-key=${TAVILY_API_KEY:}

# ==================== OfferCatcher Memory 配置 ====================
offercatcher.memory.retrieval-min-length=10
offercatcher.memory.top-k=5
offercatcher.memory.context-max-size=20480

# ==================== OfferCatcher Interview 配置 ====================
offercatcher.interview.max-follow-ups=3

# ==================== OfferCatcher Telemetry 配置 ====================
offercatcher.telemetry.otlp-endpoint=http://localhost:4317
offercatcher.telemetry.enabled=false

# ==================== Actuator 配置 ====================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.export.otlp.enabled=${offercatcher.telemetry.enabled}
management.metrics.export.otlp.url=${offercatcher.telemetry.otlp-endpoint}/v1/metrics
management.health.redis.enabled=false
